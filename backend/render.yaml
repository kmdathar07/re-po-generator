services:
  - type: web
    name: re-po-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FRONTEND_URL
        value: https://re-po-generator.vercel.app